version: "3.8"

services:
  openclaw-agent:
    image: openclaw/agent:latest
    container_name: openclaw-agent
    restart: unless-stopped
    ports:
      - "${AGENT_PORT:-8080}:8080"
    environment:
      - NODE_ENV=production
      - OPENCLAW_MODE=agent
      - OPENCLAW_LOG_LEVEL=${LOG_LEVEL:-info}
      - OPENCLAW_DATA_DIR=/data
    volumes:
      - agent-data:/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  nginx-proxy:
    image: nginx:alpine
    container_name: openclaw-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ssl-certs:/etc/ssl/certs
    depends_on:
      openclaw-agent:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

volumes:
  agent-data:
    driver: local
  ssl-certs:
    driver: local
