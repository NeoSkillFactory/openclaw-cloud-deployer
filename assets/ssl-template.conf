# OpenClaw Agent SSL Configuration Template
# Generated by openclaw-cloud-deployer
# Variables: {{domain}}, {{email}}, {{platform}}

[req]
default_bits       = 2048
prompt             = no
default_md         = sha256
distinguished_name = dn
req_extensions     = v3_req

[dn]
C  = US
ST = California
L  = San Francisco
O  = OpenClaw
OU = Agent Deployment
CN = {{domain}}

[v3_req]
subjectAltName = @alt_names
keyUsage = digitalSignature, keyEncipherment
extendedKeyUsage = serverAuth

[alt_names]
DNS.1 = {{domain}}
DNS.2 = *.{{domain}}

# --- Platform-specific notes ---
# AWS:    Use ACM for managed certificates; this template is for self-signed fallback.
# GCP:    Use Google-managed SSL certificates when available.
# Azure:  Use App Service managed certificates or Key Vault.
# DO:     Use Let's Encrypt via certbot for automatic provisioning.

# --- Certbot command (DigitalOcean / generic) ---
# certbot certonly --standalone -d {{domain}} --email {{email}} --agree-tos --non-interactive
